      <h1>Eidos (@sweidos/eidos) — Never lose a write</h1>
      <p>
        Eidos is an offline-first abstraction layer for web apps. Declare what your app needs
        offline — Eidos picks the cache strategy, registers the Service Worker, and persists your
        action queue to IndexedDB with idempotency keys and cross-tab replay locks, so a queued
        write runs exactly once.
      </p>
      <p>Install: <code>npm install @sweidos/eidos</code></p>
      <ul>
        <li>Works with React, Next.js, SvelteKit, Vue, React Native, Tauri, and Electron</li>
        <li>Auto-generates Service Worker and cache strategies from resource() declarations</li>
        <li>Offline action queue with idempotency keys and cross-tab replay locks</li>
        <li>Zero config — no service worker file to write</li>
      </ul>
