version: 2
updates:
  # pnpm workspace — root + all packages/apps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in CI
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
