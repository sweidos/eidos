name: Deploy & Release

# Replaces Vercel's GitHub auto-deploy.
# IMPORTANT: disable Vercel's GitHub integration in Vercel dashboard ‚Üí Project Settings
# ‚Üí Git ‚Üí disconnect, so Vercel stops attempting cloud builds on push.

on:
  push:
    branches: [main]

jobs:
  # ‚îÄ‚îÄ Deploy playground to Vercel ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  deploy:
    name: Deploy Playground
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel project settings
        # Run from apps/playground so Vercel CLI treats it as project root.
        # This makes "cd ../.." in installCommand resolve to the monorepo root,
        # not "/" (which happens when Vercel cloud builds from repo root).
        working-directory: apps/playground
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build via Vercel CLI
        working-directory: apps/playground
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        id: deploy
        working-directory: apps/playground
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"

  # ‚îÄ‚îÄ Publish @sweidos/eidos to npm if version bumped ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  npm-release:
    name: npm Release
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(jq -r '.version' packages/core/package.json)
          NAME=$(jq -r '.name' packages/core/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          if npm view "$NAME@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "v$VERSION already on npm ‚Äî skipping"
          else
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "v$VERSION not on npm ‚Äî will publish"
          fi

      - name: Build core package
        if: steps.check.outputs.publish == 'true'
        run: pnpm --filter @sweidos/eidos build

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: pnpm --filter @sweidos/eidos publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.check.outputs.version }}
          NAME=${{ steps.check.outputs.name }}
          gh release create "v$VERSION" \
            --title "$NAME v$VERSION" \
            --notes "Published \`$NAME@$VERSION\` to npm.
            Playground: ${{ needs.deploy.outputs.deployment-url }}" \
            --latest
