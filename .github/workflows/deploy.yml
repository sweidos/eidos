name: Deploy & Release

# Replaces Vercel's GitHub auto-deploy.
# IMPORTANT: disable Vercel's GitHub integration in Vercel dashboard → Project Settings
# → Git → disconnect, so Vercel stops attempting cloud builds on push.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.changeset/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Test core package ─────────────────────────────────────────────────────────
  test:
    name: Test Core Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm --filter @sweidos/eidos test
      - name: Type-check all
        run: pnpm --filter @sweidos/eidos type-check && pnpm --filter @eidos/playground type-check
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Build core
        run: pnpm build:core
      - name: Bundle size check
        run: pnpm --filter @sweidos/eidos size

  # ── Deploy playground to Vercel ───────────────────────────────────────────────
  deploy:
    name: Deploy Playground
    runs-on: ubuntu-latest
    needs: test
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_9dFnT63RjETibpQZwemoAlyf
          VERCEL_PROJECT_ID: prj_qXZjSE0IqSEArtaTM5NECnQ0JDEg

      - name: Build via Vercel CLI
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_9dFnT63RjETibpQZwemoAlyf
          VERCEL_PROJECT_ID: prj_qXZjSE0IqSEArtaTM5NECnQ0JDEg

      - name: Deploy prebuilt output
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"
        env:
          VERCEL_ORG_ID: team_9dFnT63RjETibpQZwemoAlyf
          VERCEL_PROJECT_ID: prj_qXZjSE0IqSEArtaTM5NECnQ0JDEg

  # ── Publish @sweidos/eidos to npm if version bumped ───────────────────────────
  npm-release:
    name: npm Release
    runs-on: ubuntu-latest
    needs: [test, deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(jq -r '.version' packages/core/package.json)
          NAME=$(jq -r '.name' packages/core/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          if npm view "$NAME@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "v$VERSION already on npm — skipping"
          else
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "v$VERSION not on npm — will publish"
          fi

      - name: Build core package
        if: steps.check.outputs.publish == 'true'
        run: pnpm --filter @sweidos/eidos build

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: pnpm --filter @sweidos/eidos publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.check.outputs.version }}
          NAME=${{ steps.check.outputs.name }}
          gh release create "v$VERSION" \
            --title "$NAME v$VERSION" \
            --notes "Published \`$NAME@$VERSION\` to npm.
            Playground: ${{ needs.deploy.outputs.deployment-url }}" \
            --latest
